<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daniel ❤️ Júlia</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:black;
    overflow-x:hidden;
    color:white;
}

/* ========================= */
/* INTRO */
/* ========================= */

#intro{
    position:fixed;
    width:100%;
    height:100vh;

    background:
    linear-gradient(to bottom, #000000cc, #000000),
    url('Foto1.jpg') center/cover;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:9999;

    transition:1s;
}

.intro-title{
    font-size:2.5rem;
    margin-bottom:30px;
    text-align:center;
    padding:20px;
}

.open-btn{

    padding:18px 40px;

    border:none;
    border-radius:10px;

    background:#E50914;
    color:white;

    font-size:1.2rem;

    cursor:pointer;

    transition:0.3s;

    box-shadow:0 0 25px rgba(229,9,20,0.8);

    animation:pulse 1.5s infinite;

}

.open-btn:hover{
    transform:scale(1.08);
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }

}

/* ========================= */
/* NAVBAR */
/* ========================= */

.nav{

    position:absolute;

    top:0;
    width:100%;

    padding:25px 50px;

    display:flex;
    justify-content:space-between;

    z-index:100;

}

.logo{

    color:#E50914;

    font-size:2.5rem;

    font-weight:bold;

    letter-spacing:2px;

}

/* ========================= */
/* BANNER */
/* ========================= */

.banner{

    position:relative;

    min-height:100vh;

    background:
    linear-gradient(to right,
    rgba(0,0,0,0.97) 20%,
    rgba(0,0,0,0.4)),
    url('Foto2.jpg') center/cover no-repeat;

    display:flex;
    align-items:center;

    padding:60px;

}

.content{
    max-width:800px;
    z-index:2;
}

.netflix{

    color:#E50914;

    letter-spacing:5px;

    margin-bottom:10px;

}

h1{

    font-size:5rem;

    margin-bottom:20px;

}

.subtitle{

    color:#ff4d6d;

    font-size:1.5rem;

    margin-bottom:30px;

}

/* BOTÕES */

.buttons{

    display:flex;

    gap:15px;

    margin-bottom:35px;

}

.btn{

    padding:15px 28px;

    border:none;

    border-radius:5px;

    font-size:1rem;

    cursor:pointer;

    transition:0.3s;

}

.play{
    background:white;
    color:black;
}

.play:hover{
    transform:scale(1.05);
}

.list{
    background:#444;
    color:white;
}

.list:hover{
    background:#666;
}

/* TEXTO */

.text{

    font-size:1.2rem;

    line-height:1.9;

    color:#ddd;

    min-height:450px;

    white-space:pre-line;

}

/* CONTADOR */

.counter{

    margin-top:35px;

    color:#ffb3c1;

    line-height:1.8;

    font-size:1.1rem;

}

/* GALERIA */

.section{
    padding:50px;
}

.section h2{
    margin-bottom:25px;
    font-size:2rem;
}

.cards{

    display:flex;

    gap:15px;

    overflow-x:auto;

}

.card{

    min-width:240px;

    height:140px;

    border-radius:10px;

    overflow:hidden;

    position:relative;

    transition:0.3s;

}

.card:hover{
    transform:scale(1.08);
}

.card img{

    width:100%;
    height:100%;

    object-fit:cover;

}

.card span{

    position:absolute;

    bottom:10px;
    left:10px;

    font-weight:bold;

    font-size:1rem;

}

/* ========================= */
/* VIDEO SCREEN */
/* ========================= */

#videoScreen{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100vh;

    background:black;

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999999;

    animation:fadeVideo 0.4s;

}

@keyframes fadeVideo{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}

#videoPlayer{

    width:90%;
    max-width:1200px;

    border-radius:10px;

    box-shadow:0 0 40px rgba(255,255,255,0.2);

}

.fecharVideo{

    position:absolute;

    top:20px;
    right:20px;

    width:50px;
    height:50px;

    border:none;

    border-radius:50%;

    background:#E50914;

    color:white;

    font-size:1.2rem;

    cursor:pointer;

    z-index:9999999;

    transition:0.3s;

}

.fecharVideo:hover{

    transform:scale(1.1);

}

/* CORAÇÕES */

.heart{

    position:fixed;

    color:#ff4d6d;

    opacity:0.7;

    z-index:999;

    animation:subir linear infinite;

}

@keyframes subir{

    from{

        transform:translateY(100vh);

        opacity:0;

    }

    to{

        transform:translateY(-120px);

        opacity:1;

    }

}

/* PLAYER */

audio{

    position:fixed;

    bottom:10px;

    right:10px;

    z-index:9999;

}

/* RESPONSIVO */

@media(max-width:768px){

    .banner{
        padding:25px;
    }

    h1{
        font-size:3rem;
    }

    .text{
        font-size:1rem;
    }

}

</style>

</head>

<body>

<!-- ========================= -->
<!-- INTRO -->
<!-- ========================= -->

<div id="intro">

    <div class="intro-title">
        Uma surpresa para você ❤️
    </div>

    <button class="open-btn" onclick="abrirSite()">
        Clique aqui
    </button>

</div>

<!-- ========================= -->
<!-- NAVBAR -->
<!-- ========================= -->

<div class="nav">

    <div class="logo">
        NETFLIX
    </div>

</div>

<!-- ========================= -->
<!-- BANNER -->
<!-- ========================= -->

<section class="banner">

    <div class="content">

        <div class="netflix">
            SÉRIE ORIGINAL
        </div>

        <h1>
            Nossa História de Amor ❤️
        </h1>

        <div class="subtitle">
            Daniel & Júlia
        </div>

        <div class="buttons">

            <button class="btn play" onclick="abrirVideo()">
                ▶ Assistir
            </button>

            <button class="btn list">
                ❤️ Favorito
            </button>

        </div>

        <!-- TEXTO -->

        <div class="text" id="typing"></div>

        <!-- CONTADOR -->

        <div class="counter">

            ❤️ Conversando há:
            <div id="contadorConversa"></div>

            <br>

            💍 Namorando há:
            <div id="contadorNamoro"></div>

        </div>

    </div>

</section>

<!-- ========================= -->
<!-- GALERIA -->
<!-- ========================= -->

<section class="section">

    <h2>Momentos especiais ❤️</h2>

    <div class="cards">

        <div class="card">
            <img src="Foto1.jpg">
            <span>Nosso começo</span>
        </div>

        <div class="card">
            <img src="Foto2.jpg">
            <span>Seu sorriso</span>
        </div>

        <div class="card">
            <img src="Foto3.jpg">
            <span>Minha paz</span>
        </div>

        <div class="card">
            <img src="Foto4.jpg">
            <span>Meu amor</span>
        </div>

        <div class="card">
            <img src="Foto5.jpg">
            <span>Você ❤️</span>
        </div>

        <div class="card">
            <img src="Foto6.jpg">
            <span>Nós ❤️</span>
        </div>

        <div class="card">
            <img src="Foto7.jpg">
            <span>Pra sempre</span>
        </div>

    </div>

</section>

<!-- ========================= -->
<!-- TELA DE VÍDEO -->
<!-- ========================= -->

<div id="videoScreen">

    <button class="fecharVideo" onclick="fecharVideo()">
        ✖
    </button>

    <video id="videoPlayer" controls>

        <source src="video.mp4" type="video/mp4">

    </video>

</div>

<!-- ========================= -->
<!-- MÚSICA -->
<!-- ========================= -->

<audio id="music" autoplay loop controls>

    <source src="Música.mp3" type="audio/mpeg">

</audio>

<script>

/* ========================= */
/* ABRIR SITE + MÚSICA */
/* ========================= */

function abrirSite(){

    const musica =
    document.getElementById("music");

    musica.volume = 0.5;

    musica.play();

    document.getElementById("intro").style.opacity = "0";

    setTimeout(() => {

        document.getElementById("intro").style.display = "none";

    }, 1000);

}

/* ========================= */
/* ABRIR VÍDEO */
/* ========================= */

function abrirVideo(){

    const tela =
    document.getElementById("videoScreen");

    const video =
    document.getElementById("videoPlayer");

    tela.style.display = "flex";

    video.currentTime = 0;

    video.play();

}

/* ========================= */
/* FECHAR VÍDEO */
/* ========================= */

function fecharVideo(){

    const tela =
    document.getElementById("videoScreen");

    const video =
    document.getElementById("videoPlayer");

    tela.style.display = "none";

    video.pause();

}

/* ========================= */
/* TEXTO LETRA POR LETRA */
/* ========================= */

const texto = `

Nossa história começou no dia 10 de janeiro, com uma simples mensagem:
"Reagiu ao seu story 😍"

Era um sábado, às 11h53 da manhã.
E foi exatamente nesse momento que começou a minha série favorita ❤️
A nossa história.

Começamos a conversar e, a cada dia que passava, o seu jeitinho marcante me deixava ainda mais apaixonado.

Lembro de cada detalhe.
Lembro do nosso primeiro assunto: "cadastro".
Lembro da primeira foto que você me enviou.
Lembro de tudo.

Porque cada detalhe seu ficou marcado no meu coração.

Meu amor...
Dia 8 de fevereiro foi o primeiro capítulo da nossa história oficialmente juntos ❤️

Foi o dia em que demos o primeiro passo:
o nosso namoro.

Desde então, eu vivo com um sorriso no rosto.
Ganhei um compromisso, uma responsabilidade, mas principalmente...
ganhei você.

E eu confesso:
você foi uma das coisas mais importantes e mais bonitas que aconteceram na minha vida.

Cada mensagem sua,
cada beijo,
cada abraço,
cada cheiro,
cada momento ao seu lado...
tudo isso ficou guardado dentro de mim de um jeito impossível de explicar.

Esse site está sendo criado no dia 13/05/2026.
Mas acredito que você só verá tudo isso no dia 12 de junho ❤️

Porque ele foi feito especialmente para o nosso dia:
o Dia dos Namorados.

Nesse mês completamos 4 meses de namoro,
e eu fico feliz todos os dias por ser o seu namorado.

Sinto orgulho,
sinto felicidade,
e sinto honra por ter você comigo ❤️❤️❤️

Você é a minha paz,
meu lugar favorito,
meu pensamento diário,
e a melhor parte dos meus dias.

Eu amo você, minha princesa.
E penso em você todos os dias ❤️

`;

let i = 0;

function escrever(){

    if(i < texto.length){

        document.getElementById("typing").innerHTML +=
        texto.charAt(i);

        i++;

        setTimeout(escrever, 28);

    }

}

escrever();

/* ========================= */
/* CONTADORES */
/* ========================= */

function atualizarContador(){

    const conversa =
    new Date("2026-01-10T11:53:00");

    const namoro =
    new Date("2026-02-08T00:00:00");

    const agora = new Date();

    function calcular(data){

        let diff = agora - data;

        let dias =
        Math.floor(diff / (1000 * 60 * 60 * 24));

        let horas =
        Math.floor(diff / (1000 * 60 * 60)) % 24;

        let minutos =
        Math.floor(diff / (1000 * 60)) % 60;

        let segundos =
        Math.floor(diff / 1000) % 60;

        return `
        ${dias} dias,
        ${horas} horas,
        ${minutos} minutos
        e ${segundos} segundos ❤️
        `;
    }

    document.getElementById("contadorConversa").innerHTML =
    calcular(conversa);

    document.getElementById("contadorNamoro").innerHTML =
    calcular(namoro);

}

setInterval(atualizarContador, 1000);

/* ========================= */
/* CHUVA DE CORAÇÕES */
/* ========================= */

function criarCoracao(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left =
    Math.random() * 100 + "vw";

    heart.style.fontSize =
    (Math.random() * 20 + 15) + "px";

    heart.style.animationDuration =
    (Math.random() * 3 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {

        heart.remove();

    }, 7000);

}

setInterval(criarCoracao, 250);

</script>

</body>
</html>
